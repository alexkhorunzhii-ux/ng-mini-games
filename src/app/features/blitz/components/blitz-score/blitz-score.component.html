<div class="blitz-score">
  <div class="blitz-score__item blitz-score__item--player">
    <span class="blitz-score__label">Player</span>
    <span class="blitz-score__value">{{ score().player }}</span>
  </div>
  <div class="blitz-score__divider">:</div>
  <div class="blitz-score__item blitz-score__item--opponent">
    <span class="blitz-score__label">Computer</span>
    <span class="blitz-score__value">{{ score().opponent }}</span>
  </div>
</div>
